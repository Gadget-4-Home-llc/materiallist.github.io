<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;width:90%}
    .icon{font-size:56px;margin-bottom:20px}
    h1{font-size:24px;font-weight:700;margin-bottom:12px}
    p{font-size:15px;color:#94a3b8;line-height:1.6}
    .badge{display:inline-block;margin-top:24px;background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3);border-radius:999px;padding:6px 18px;font-size:13px;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#9989;</div>
    <h1>Email Confirmed!</h1>
    <p>Your account is ready.<br>Close this tab and open the <strong>Material List</strong> extension to sign in.</p>
    <div class="badge">Material List: Easy Estimates &amp; Invoices</div>
  </div>
</body>
</html>
